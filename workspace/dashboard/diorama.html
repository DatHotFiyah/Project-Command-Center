        </div>
        <div id="open-loops-body" class="open-loops-body collapsed">
          <div id="open-loops-content"></div>
        </div>
      </div>
      <div class="diorama-container" id="diorama">
        <div class="floor-layer" id="floor"></div>
        <div class="wall-layer" id="wall"></div>
        <div class="side-wall left-wall"></div>
        <div class="side-wall right-wall"></div>
        <div class="objects-layer" id="objects">
           <!-- Sprites will be injected here -->
        </div>
      </div>
      <div class="scanline-glow"></div>
    </main>

    <footer class="status-panel">
      <div class="status-box" id="stat-xp">
        <div class="status-label">SYS_LEVEL</div>
        <div class="status-value" id="val-level">LEVEL 5</div>
        <div class="xp-bar-container">
          <div class="xp-bar-fill" id="val-xp-fill" style="width: 75%;"></div>
        </div>
        <div class="status-value" id="val-xp-text" style="margin-top: 5px;">450 / 600 EXP</div>
      </div>
      <div class="status-box" id="stat-project">
        <div id="val-project-name">PROJECT_STATE</div>
        <div style="display:flex; justify-content:space-between; margin-bottom:4px;">
          <div><span class="status-label">ROLE:</span> <span class="status-value" id="val-role">SYSTEM</span></div>
          <div><span class="status-label">MOOD:</span> <span class="status-value" id="val-project-status">ONLINE</span></div>
        </div>
        <div class="status-label" style="margin-top:6px;">ACTIVE_TASK:</div>
        <div id="val-project-task">INITIALIZING...</div>
      </div>
      <div class="status-box" id="stat-roster">
        <div class="status-label">PROJECT ROSTER</div>
        <div id="roster-list"></div>
      </div>
      <div class="status-box" id="stat-sys">
        <div class="status-label" title="Measures workspace coherence: recency, memory completeness, sync quality, journal health.">
          SIGNAL_DRIFT
        </div>
        <div class="status-value" id="val-drift">0.02%</div>
        <div class="status-label" style="margin-top:6px;">MEMORY_VAULT</div>
        <div class="status-value" id="val-mood">SECURE</div>
        <div class="status-label" style="margin-top:6px;">MOMENTUM</div>
        <div class="status-value" id="val-momentum">0%</div>

    </footer>
